<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mother's Day Message Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #FDF8F4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }
    .header { text-align: center; margin-bottom: 32px; animation: fadeDown 0.6s ease both; }
    .header .icon { font-size: 48px; display: block; animation: float 3.5s ease-in-out infinite; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(22px, 6vw, 34px); color: #3A2E28; margin: 10px 0 5px; }
    .header p { font-size: 13px; color: #A08060; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; }
    .divider { color: #C2A98A; letter-spacing: 10px; font-size: 11px; margin: 12px 0; opacity: 0.5; }
    .card { background: #fff; border-radius: 24px; padding: 32px 28px; box-shadow: 0 12px 40px rgba(90,60,40,0.10); border: 1px solid #F0E0D0; max-width: 480px; width: 100%; animation: fadeUp 0.7s 0.2s ease both; }
    label { display: block; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #B8967E; margin-bottom: 8px; }
    .name-row { display: flex; gap: 10px; margin-bottom: 20px; }
    input[type="text"] { flex: 1; padding: 13px 18px; border-radius: 50px; border: 2px solid #E8D5C4; font-family: 'Nunito', sans-serif; font-size: 15px; color: #3A2E28; outline: none; transition: border 0.2s; background: #FDF8F4; }
    input[type="text"]:focus { border-color: #C4724A; }
    input[type="text"]::placeholder { color: #C2A98A; }
    .gen-btn { padding: 13px 22px; border-radius: 50px; border: none; background: linear-gradient(135deg, #C4724A, #E8A98A); color: #fff; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; white-space: nowrap; transition: transform 0.18s; box-shadow: 0 4px 14px rgba(196,114,74,0.35); -webkit-tap-highlight-color: transparent; }
    .gen-btn:hover { transform: scale(1.04); }
    .gen-btn:active { transform: scale(0.97); }
    .template-label { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #B8967E; margin-bottom: 10px; display: block; }
    .templates { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .tmpl-btn { padding: 8px 16px; border-radius: 40px; border: 2px solid #E8D5C4; background: #fff; color: #A08060; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.18s; -webkit-tap-highlight-color: transparent; }
    .tmpl-btn.active, .tmpl-btn:hover { background: #C4724A; color: #fff; border-color: #C4724A; }
    .msg-box { background: #FDF8F4; border: 2px solid #E8D5C4; border-radius: 16px; padding: 20px; font-size: 15px; line-height: 1.8; color: #3A2E28; min-height: 160px; white-space: pre-wrap; font-family: 'Nunito', sans-serif; margin-bottom: 16px; transition: border 0.3s; word-break: break-word; }
    .msg-box.ready { border-color: #C4724A55; }
    .placeholder-msg { color: #C2A98A; font-style: italic; font-size: 14px; text-align: center; display: block; margin-top: 20px; }
    .actions { display: flex; gap: 10px; }
    .action-btn { flex: 1; padding: 13px; border-radius: 50px; border: 2px solid #E8D5C4; background: #fff; color: #C4724A; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.18s; -webkit-tap-highlight-color: transparent; }
    .action-btn:hover { background: #C4724A; color: #fff; border-color: #C4724A; transform: translateY(-2px); }
    .action-btn:active { transform: translateY(0); }
    .action-btn.primary { background: linear-gradient(135deg, #C4724A, #E8A98A); color: #fff; border: none; box-shadow: 0 4px 14px rgba(196,114,74,0.30); }
    .action-btn.primary:hover { opacity: 0.9; transform: translateY(-2px); }
    .counter { text-align: center; margin-top: 20px; font-size: 12px; color: #C2A98A; letter-spacing: 1px; }
    .count-num { font-size: 28px; font-family: 'Playfair Display', serif; color: #C4724A; display: block; margin-bottom: 2px; }
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(70px); background: #3A2E28; color: #fff; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 600; padding: 12px 24px; border-radius: 40px; box-shadow: 0 8px 24px rgba(0,0,0,0.18); transition: transform 0.4s ease, opacity 0.4s ease; opacity: 0; z-index: 999; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  </style>
</head>
<body>

  <header class="header">
    <span class="icon">💌</span>
    <h1>Mother's Day DM Generator</h1>
    <p>Personalized Messages for Every Mom</p>
    <div class="divider">✦ ✦ ✦</div>
  </header>

  <div class="card">
    <label>Mom's Name</label>
    <div class="name-row">
      <input type="text" id="nameInput" placeholder="e.g. Maria, Tita Rose…" maxlength="40" />
      <button class="gen-btn" onclick="generateMessage()">✦ Generate</button>
    </div>

    <span class="template-label">Message Style</span>
    <div class="templates">
      <button class="tmpl-btn active" onclick="setTemplate(0, this)">Warm 🌸</button>
      <button class="tmpl-btn" onclick="setTemplate(1, this)">Faith-filled 🙏</button>
      <button class="tmpl-btn" onclick="setTemplate(2, this)">Short & Sweet 💛</button>
      <button class="tmpl-btn" onclick="setTemplate(3, this)">Heartfelt 🤍</button>
    </div>

    <div class="msg-box" id="msgBox">
      <span class="placeholder-msg">Enter a name above and tap Generate 🌷</span>
    </div>

    <div class="actions">
      <button class="action-btn" onclick="copyMessage()">📋 Copy</button>
      <button class="action-btn primary" onclick="shareMessage()">📤 Share</button>
    </div>

    <div class="counter">
      <span class="count-num" id="countNum">0</span>
      messages sent today 🌷
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const LINK = "https://luminous-melomakarona-9a3d83.netlify.app/";
    let selectedTemplate = 0;
    let currentMessage = "";

    // Restore counter
    let sentCount = parseInt(localStorage.getItem('sentCount') || '0');
    const today = new Date().toDateString();
    if (localStorage.getItem('sentDate') !== today) {
      sentCount = 0;
      localStorage.setItem('sentDate', today);
    }
    document.getElementById('countNum').textContent = sentCount;

    function buildMessage(name, idx) {
      const msgs = [
        // 0 Warm
        "🌷 Happy Mother's Day, " + name + "! 🌷\n\nWishing you a day filled with love, rest, and joy — you deserve it all!\n\nI made this little something for you. Whether you're feeling tired, grateful, overwhelmed, or happy today — there's a Bible verse here just for you 💕\n\n👉 " + LINK + "\n\nYou are seen. You are loved. You are enough. 🤍",
        // 1 Faith-filled
        "🙏 Happy Mother's Day, dear " + name + "!\n\n\"Her children arise and call her blessed.\" — Proverbs 31:28\n\nToday and every day, you are a blessing to everyone around you. I put together something special — Bible verses for every feeling a mama might have. Open it and let God speak to your heart today 💛\n\n👉 " + LINK + "\n\nGod bless you, Mama. 🌸",
        // 2 Short & Sweet
        "Happy Mother's Day, " + name + "! 🌷\n\nA little gift for you — Bible verses for whatever you're feeling today 💕\n\n👉 " + LINK + "\n\nYou are loved! 🤍",
        // 3 Heartfelt
        "💌 To the amazing " + name + ",\n\nHappy Mother's Day! Being a mom is one of the hardest and most beautiful things in the world — and you do it with so much love and grace.\n\nI wanted to send you something meaningful today. This has Bible verses for every feeling — because motherhood has ALL the feelings! 😊\n\n👉 " + LINK + "\n\nThank you for all that you do. You are truly a gift. 🌷🤍"
      ];
      return msgs[idx];
    }

    function setTemplate(idx, btn) {
      selectedTemplate = idx;
      document.querySelectorAll('.tmpl-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (document.getElementById('nameInput').value.trim()) generateMessage();
    }

    function generateMessage() {
      const name = document.getElementById('nameInput').value.trim();
      const box = document.getElementById('msgBox');
      if (!name) {
        box.innerHTML = '<span class="placeholder-msg">Enter a name above and tap Generate 🌷</span>';
        box.classList.remove('ready');
        currentMessage = "";
        return;
      }
      currentMessage = buildMessage(name, selectedTemplate);
      box.textContent = currentMessage;
      box.classList.add('ready');
    }

    // Bulletproof copy — works on all browsers & mobile
    function doCopy(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }
      // Fallback for older browsers / non-HTTPS
      return new Promise((resolve) => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.cssText = 'position:absolute;left:-9999px;top:0;';
        document.body.appendChild(ta);
        ta.select();
        ta.setSelectionRange(0, ta.value.length); // iOS
        document.execCommand('copy');
        document.body.removeChild(ta);
        resolve();
      });
    }

    function copyMessage() {
      if (!currentMessage) { showToast('Enter a name first! 🌷'); return; }
      doCopy(currentMessage).then(() => {
        showToast('✅ Copied! Paste into your DM');
        incrementCount();
      }).catch(() => {
        showToast('Long-press the message box to copy manually');
      });
    }

    // Share — opens native share sheet ONLY, does NOT copy
    function shareMessage() {
      if (!currentMessage) { showToast('Enter a name first! 🌷'); return; }
      if (navigator.share) {
        navigator.share({ text: currentMessage })
          .then(() => incrementCount())
          .catch(() => {});
      } else {
        // Desktop fallback
        doCopy(currentMessage).then(() => {
          showToast('✅ Copied! Open Messenger or Instagram and paste 💕');
          incrementCount();
        });
      }
    }

    function incrementCount() {
      sentCount++;
      localStorage.setItem('sentCount', sentCount);
      localStorage.setItem('sentDate', today);
      document.getElementById('countNum').textContent = sentCount;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
